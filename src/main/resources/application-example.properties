spring.application.name=full-erp-system-project

# ================================
# POSTGRESQL DATASOURCE
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_system
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ================================
# FLYWAY
# ================================
spring.flyway.enabled=false

# ================================
# JWT
# ================================
# Ganti dengan random string >= 256-bit (minimal 32 karakter)
app.jwt.secret=GANTI_DENGAN_SECRET_KEY_MINIMAL_256_BIT_RANDOM_STRING
app.jwt.expiration-ms=86400000

# ================================
# SERVER
# ================================
server.port=8081

# ================================
# CORS
# ================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ================================
# LOGGING
# ================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=WARN
logging.level.org.flywaydb=INFO
logging.level.com.ERP=DEBUG
